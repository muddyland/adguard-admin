stages:
  - lint
  - test
  - build

# ── Shared bases ──────────────────────────────────────────────────────────

.python_base:
  image: python:3.12-slim
  tags: [saas-linux-small-amd64]
  before_script:
    - pip install --quiet -r backend/requirements.txt

.node_base:
  image: node:22-alpine
  tags: [saas-linux-small-amd64]
  before_script:
    - cd frontend && npm ci

# ── Lint ──────────────────────────────────────────────────────────────────

lint:backend:
  stage: lint
  image: python:3.12-slim
  tags: [saas-linux-small-amd64]
  before_script:
    - pip install --quiet ruff
  script:
    - cd backend && ruff check app

# ── Test ──────────────────────────────────────────────────────────────────

test:backend:
  extends: .python_base
  stage: test
  variables:
    DATABASE_URL: "sqlite:///./ci.db"
    FERNET_KEY: "ci-placeholder-key-generated-below"
  script:
    - cd backend
    # Generate a real Fernet key for the run (server creds need one).
    - export FERNET_KEY=$(python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())")
    # Import smoke test — fails fast on broken imports / wiring.
    - python -c "import app.main; print('app import OK')"
    # Boot the app via TestClient and hit health + an authed flow.
    - |
      python -c "
      from fastapi.testclient import TestClient
      from app.main import app
      with TestClient(app) as c:
          assert c.get('/api/health').json()['status'] == 'ok'
          tok = c.post('/api/auth/token', data={'username':'admin','password':'admin'}).json()['access_token']
          h = {'Authorization': f'Bearer {tok}'}
          assert c.get('/api/auth/me', headers=h).json()['role'] == 'admin'
          print('smoke test OK')
      "

build:frontend:
  extends: .node_base
  stage: test
  script:
    - npm run build
  artifacts:
    paths: [frontend/dist]
    expire_in: 14 days

# ── Build images ──────────────────────────────────────────────────────────

.docker_base:
  stage: build
  tags: [saas-linux-small-amd64]
  image: docker:24.0.5
  services: [docker:24.0.5-dind]
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - until docker info; do sleep 1; done
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  rules:
    - if: '$CI_COMMIT_REF_NAME == "main"'
    - if: '$CI_COMMIT_TAG'

build:backend-image:
  extends: .docker_base
  script:
    - docker build --tag $CI_REGISTRY_IMAGE/backend:$CI_COMMIT_REF_NAME backend
    - docker push $CI_REGISTRY_IMAGE/backend:$CI_COMMIT_REF_NAME

build:frontend-image:
  extends: .docker_base
  script:
    - docker build --tag $CI_REGISTRY_IMAGE/frontend:$CI_COMMIT_REF_NAME frontend
    - docker push $CI_REGISTRY_IMAGE/frontend:$CI_COMMIT_REF_NAME
