services:
  app:
    build: .
    restart: unless-stopped
    environment:
      DATABASE_URL: sqlite:////data/adguard_admin.db
      SECRET_KEY: ${SECRET_KEY:?set SECRET_KEY in .env}
      FERNET_KEY: ${FERNET_KEY:?set FERNET_KEY in .env}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin}
      SYNC_INTERVAL_SECONDS: ${SYNC_INTERVAL_SECONDS:-60}
      # UI and API share one origin now; default to the published port below.
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:8080}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8080}
      # Public URL of this admin app, reachable by provisioned servers.
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:8080}
      PROVISION_TOKEN_TTL_HOURS: ${PROVISION_TOKEN_TTL_HOURS:-24}
      # OIDC (optional)
      OIDC_ENABLED: ${OIDC_ENABLED:-false}
      OIDC_ISSUER: ${OIDC_ISSUER:-}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:-}
      OIDC_REDIRECT_URI: ${OIDC_REDIRECT_URI:-http://localhost:8080/api/auth/oidc/callback}
      OIDC_ADMIN_GROUP: ${OIDC_ADMIN_GROUP:-}
    volumes:
      - adguard_admin_data:/data
    ports:
      # host:container — UI + API both served on container port 8000.
      - "8080:8000"

volumes:
  adguard_admin_data:
